<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Eden Grill POS</title>
<link rel="stylesheet" href="styles.css">
<style>
  #print-area { display: none; }
  @media print {
    html, body { margin: 0 !important; padding: 0 !important; background: #fff !important; }
    body > *:not(#print-area) { display: none !important; }
    #print-area { display: block !important; }
    .receipt { width: 76mm; margin: 0 auto; padding: 4mm 2mm; color: #000; background: #fff;
      font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.35; page-break-after: always; }
    .receipt:last-child { page-break-after: auto; }
    .receipt .r-center { text-align: center; }
    .receipt .r-title { font-size: 16px; font-weight: 700; letter-spacing: 0.05em; }
    .receipt .r-copy { font-weight: 700; margin: 4px 0; }
    .receipt hr { border: none; border-top: 1px dashed #000; margin: 6px 0; }
    .receipt .r-row { display: flex; justify-content: space-between; gap: 8px; }
    .receipt .r-opts { padding-left: 8px; font-size: 11px; }
    .receipt .r-total { font-weight: 700; font-size: 14px; }
    .receipt .r-foot { text-align: center; margin-top: 8px; font-size: 11px; }
  }
</style>
</head>
<body>

<header class="pos-header">
  <div class="pos-header-left">
    <img src="logo.png" alt="Eden Grill" class="pos-logo">
    <div class="pos-brand">
      <h1>Eden Grill</h1>
      <span class="pos-location">OKC</span>
    </div>
  </div>
  <div class="pos-header-right">
    <button class="pos-btn pos-btn-ghost" onclick="openPrinter()" title="Printer">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      <span class="printer-dot" id="printer-dot"></span>
    </button>
    <div class="pos-time" id="pos-time"></div>
  </div>
</header>

<main class="pos-main" id="pos-main"></main>

<div class="order-bar" id="order-bar" onclick="openCart()">
  <div class="order-bar-inner">
    <div class="order-bar-left">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
      <span class="order-bar-count" id="order-bar-count">0 items</span>
    </div>
    <div class="order-bar-total" id="order-bar-total">$0.00</div>
  </div>
</div>

<!-- Modifier Modal -->
<div class="modal-overlay" id="modifier-modal">
  <div class="modifier-panel">
    <div class="modifier-header">
      <h2 id="modifier-title">Item</h2>
      <div class="modifier-price" id="modifier-price">$0</div>
      <button class="modal-close" onclick="closeModifiers()">✕</button>
    </div>
    <div class="modifier-body" id="modifier-body"></div>
    <div class="modifier-footer">
      <div class="qty-row">
        <button class="qty-btn" onclick="modQty(-1)">−</button>
        <span class="qty-val" id="mod-qty">1</span>
        <button class="qty-btn" onclick="modQty(1)">+</button>
      </div>
      <div class="mod-total" id="mod-total">$0.00</div>
      <button class="add-btn" id="mod-add-btn" onclick="addFromModifier()">Add to Order</button>
    </div>
  </div>
</div>

<!-- Cart Modal -->
<div class="modal-overlay" id="cart-modal">
  <div class="cart-panel">
    <div class="cart-header">
      <div>
        <h2>Current Order</h2>
        <div class="cart-meta"><span id="cart-order-num"></span> · <span id="cart-timestamp"></span></div>
      </div>
      <button class="modal-close" onclick="closeCart()">✕</button>
    </div>
    <div class="cart-customer">
      <label>Customer Name</label>
      <input type="text" id="customer-name" placeholder="Name for ticket" autocomplete="off">
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-promo">
      <input type="text" id="promo-input" placeholder="Promo code" autocomplete="off">
      <button onclick="applyPromo()">Apply</button>
    </div>
    <div class="promo-msg" id="promo-msg"></div>
    <div class="cart-summary">
      <div class="cart-summary-row"><span>Subtotal</span><span id="cart-subtotal">$0.00</span></div>
      <div class="cart-summary-row cart-summary-discount" id="cart-discount-row" style="display:none"><span>Discount</span><span id="cart-discount">-$0.00</span></div>
      <div class="cart-summary-row cart-summary-total"><span>TOTAL</span><span id="cart-total">$0.00</span></div>
    </div>
    <button class="pay-btn" onclick="placeOrder()">Pay Cash &amp; Print</button>
  </div>
</div>

<!-- Order Confirmation -->
<div class="modal-overlay" id="order-confirmation">
  <div class="confirm-panel">
    <div class="confirm-check">✓</div>
    <h2>Order Placed!</h2>
    <p id="confirmation-text"></p>
    <button class="pay-btn" onclick="closeConfirmation()">Done</button>
  </div>
</div>

<!-- Printer Settings Modal -->
<div class="modal-overlay" id="printer-modal">
  <div class="modifier-panel" style="max-width:400px">
    <div class="modifier-header">
      <h2>Receipt Printer</h2>
      <button class="modal-close" onclick="closePrinter()">✕</button>
    </div>
    <div class="printer-settings">
      <div class="printer-status-row">
        <span class="printer-dot" id="printer-status-dot"></span>
        <span id="printer-status-text">Not connected</span>
      </div>
      <button class="printer-action-btn primary" id="btn-usb" onclick="connectPrinter('usb')">Connect USB Printer</button>
      <button class="printer-action-btn primary" id="btn-bt" onclick="connectPrinter('bluetooth')">Connect Bluetooth Printer</button>
      <button class="printer-action-btn" id="btn-test" onclick="testPrint()">Print Test Receipt</button>
      <button class="printer-action-btn danger" id="btn-disc" onclick="disconnectPrinter()">Disconnect</button>
      <div class="printer-msg" id="printer-msg"></div>
      <div class="paper-select">
        <button id="paper-58" onclick="setPaper(32)">58mm</button>
        <button id="paper-80" onclick="setPaper(48)">80mm</button>
        <button id="paper-4x6" onclick="setPaper(64)">4x6"</button>
      </div>
      <p class="printer-note" id="printer-support-note"></p>
    </div>
  </div>
</div>

<div id="print-area"></div>

<script src="printer.js"></script>
<script>
const STORAGE_KEY = 'edenGrillOrders';

const SECTION_META = {
  onBread:    { label: 'ON BREAD',    icon: '🍔' },
  onTortilla: { label: 'ON TORTILLA', icon: '🌮' },
  onFry:      { label: 'ON FRY',      icon: '🍟' },
  combos:     { label: 'COMBOS',      icon: '📋' },
  drinks:     { label: 'DRINKS & SNACKS', icon: '🥤' }
};

const PROMO_CODES = { 'STAFF69': 0.5, 'MGR69': 1 };
let appliedPromo = null;
let menuData = {};
let cart = [];
let modItem = null;
let modItemKey = '';
let modQtyVal = 1;

function updateClock() {
  const el = document.getElementById('pos-time');
  if (el) el.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
setInterval(updateClock, 10000);
updateClock();

function renderAll() {
  const main = document.getElementById('pos-main');
  var html = '';
  Object.keys(SECTION_META).forEach(function(key) {
    var items = menuData[key] || [];
    if (items.length === 0) return;
    html += '<div class="pos-section">' +
      '<div class="pos-section-header">' + SECTION_META[key].icon + ' ' + SECTION_META[key].label + '</div>' +
      '<div class="pos-section-items">';
    items.forEach(function(item, i) {
      var itemKey = key + '-' + i;
      html += '<button class="item-card" onclick="openModifier(\'' + itemKey + '\', ' + i + ')">' +
        '<div class="item-card-name">' + item.name + '</div>' +
        '<div class="item-card-price">$' + item.price + '</div>' +
      '</button>';
    });
    html += '</div></div>';
  });
  main.innerHTML = html;
}

function openModifier(key, idx) {
  var parts = key.split('-');
  var cat = parts[0];
  var i = parseInt(parts[1]);
  var item = menuData[cat][i];
  modItem = item;
  modItemKey = key;
  modQtyVal = 1;

  document.getElementById('modifier-title').textContent = item.name;
  document.getElementById('modifier-price').textContent = '$' + item.price;
  document.getElementById('mod-qty').textContent = '1';

  var body = document.getElementById('modifier-body');
  if (!item.optionGroups || item.optionGroups.length === 0) {
    body.innerHTML = '<p style="color:var(--text-dim);text-align:center;padding:2rem 0;">No modifiers — tap Add to Order</p>';
  } else {
    body.innerHTML = item.optionGroups.map(function(group, gi) {
      var isRadio = group.type === 'radio';
      var options = group.options.map(function(opt, oi) {
        var isObj = typeof opt === 'object';
        var name = isObj ? opt.name : opt;
        var price = isObj ? opt.price : 0;
        var inputName = isRadio ? 'mod-g' + gi : 'mod-g' + gi + '-' + oi;
        return '<label class="mod-option">' +
          '<input type="' + (isRadio ? 'radio' : 'checkbox') + '" name="' + inputName + '" value="' + name + '"' +
          (price ? ' data-price="' + price + '"' : '') +
          (isRadio && oi === 0 ? ' checked' : '') +
          ' onchange="updateModTotal()">' +
          '<span class="mod-option-text">' + name + (price > 0 ? ' <em>(+$' + price + ')</em>' : '') + '</span>' +
        '</label>';
      }).join('');
      return '<div class="mod-group">' +
        '<div class="mod-group-label">' + group.label + '</div>' +
        options +
      '</div>';
    }).join('');
  }

  updateModTotal();
  document.getElementById('modifier-modal').classList.add('active');
}

function closeModifiers() {
  document.getElementById('modifier-modal').classList.remove('active');
}

function modQty(delta) {
  modQtyVal = Math.max(1, modQtyVal + delta);
  document.getElementById('mod-qty').textContent = modQtyVal;
  updateModTotal();
}

function modUnitTotal() {
  var total = modItem.price;
  var modal = document.getElementById('modifier-body');
  modal.querySelectorAll('input[type="checkbox"]:checked').forEach(function(cb) {
    total += parseFloat(cb.dataset.price || 0);
  });
  return total;
}

function updateModTotal() {
  var unit = modUnitTotal();
  document.getElementById('mod-total').textContent = '$' + (unit * modQtyVal).toFixed(2);
}

function addFromModifier() {
  var modal = document.getElementById('modifier-body');
  var radios = Array.from(modal.querySelectorAll('input[type="radio"]:checked')).map(function(r) { return r.value; });
  var checks = Array.from(modal.querySelectorAll('input[type="checkbox"]:checked')).map(function(c) { return c.value; });
  cart.push({
    name: modItem.name,
    options: radios.concat(checks),
    unitTotal: modUnitTotal(),
    quantity: modQtyVal
  });
  closeModifiers();
  updateOrderBar();
}

function updateOrderBar() {
  var count = cart.reduce(function(s, i) { return s + i.quantity; }, 0);
  var total = cart.reduce(function(s, i) { return s + i.unitTotal * i.quantity; }, 0);
  document.getElementById('order-bar-count').textContent = count + ' item' + (count !== 1 ? 's' : '');
  document.getElementById('order-bar-total').textContent = '$' + total.toFixed(2);
}

function openCart() {
  var now = new Date();
  document.getElementById('cart-order-num').textContent = 'ORD-' + Date.now().toString().slice(-6);
  document.getElementById('cart-timestamp').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  var items = document.getElementById('cart-items');
  if (cart.length === 0) {
    items.innerHTML = '<p style="text-align:center;color:var(--text-dim);padding:2rem 0;">No items yet</p>';
  } else {
    items.innerHTML = cart.map(function(item, i) {
      return '<div class="cart-item">' +
        '<div class="cart-item-top">' +
          '<span class="cart-item-qty">x' + item.quantity + '</span>' +
          '<span class="cart-item-name">' + item.name + '</span>' +
          '<span class="cart-item-price">$' + (item.unitTotal * item.quantity).toFixed(2) + '</span>' +
        '</div>' +
        (item.options.length ? '<div class="cart-item-opts">' + item.options.join(', ') + '</div>' : '') +
        '<button class="cart-item-remove" onclick="removeFromCart(' + i + ')">Remove</button>' +
      '</div>';
    }).join('');
  }
  var subtotal = cart.reduce(function(s, i) { return s + i.unitTotal * i.quantity; }, 0);
  document.getElementById('cart-subtotal').textContent = '$' + subtotal.toFixed(2);
  var discRow = document.getElementById('cart-discount-row');
  if (appliedPromo) {
    var disc = subtotal * appliedPromo.rate;
    document.getElementById('cart-discount').textContent = '-$' + disc.toFixed(2);
    document.getElementById('cart-total').textContent = '$' + (subtotal - disc).toFixed(2);
    discRow.style.display = '';
  } else {
    discRow.style.display = 'none';
    document.getElementById('cart-total').textContent = '$' + subtotal.toFixed(2);
  }
  document.getElementById('cart-modal').classList.add('active');
}

function closeCart() { document.getElementById('cart-modal').classList.remove('active'); }
function removeFromCart(i) { cart.splice(i, 1); updateOrderBar(); openCart(); }

function applyPromo() {
  var input = document.getElementById('promo-input');
  var msg = document.getElementById('promo-msg');
  var code = input.value.trim().toUpperCase();
  if (!code) { appliedPromo = null; msg.textContent = ''; msg.className = 'promo-msg'; openCart(); return; }
  if (PROMO_CODES[code] !== undefined) {
    appliedPromo = { code: code, rate: PROMO_CODES[code] };
    msg.textContent = code + ' — ' + Math.round(appliedPromo.rate * 100) + '% off';
    msg.className = 'promo-msg ok';
  } else {
    appliedPromo = null;
    msg.textContent = 'Invalid code';
    msg.className = 'promo-msg err';
  }
  openCart();
}

async function placeOrder() {
  var name = document.getElementById('customer-name').value.trim();
  if (!name) { alert('Enter a name for the order ticket'); return; }
  if (cart.length === 0) { alert('Add at least one item'); return; }
  var subtotal = cart.reduce(function(s, i) { return s + i.unitTotal * i.quantity; }, 0);
  var rate = appliedPromo ? appliedPromo.rate : 0;
  var discount = +(subtotal * rate).toFixed(2);
  var total = +(subtotal - discount).toFixed(2);
  var order = {
    id: 'ORD-' + Date.now().toString().slice(-6),
    location: 'okc',
    customer: { name: name },
    items: cart.map(function(i) { return { name: i.name, options: i.options, quantity: i.quantity, total: i.unitTotal * i.quantity }; }),
    subtotal: subtotal, discount: discount, promoCode: appliedPromo ? appliedPromo.code : null,
    total: total, payment: 'cash', paid: true,
    timestamp: new Date().toISOString()
  };
  var all = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  all.push(order);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));

  var printedVia = 'browser';
  var printerReady = window.EdenPrinter && EdenPrinter.status().connected;
  if (printerReady) {
    try { await EdenPrinter.printOrder(order); printedVia = 'thermal'; }
    catch (err) { console.error('Thermal print failed:', err); printReceipts(order); }
  } else {
    printReceipts(order);
  }

  closeCart();
  var tail = printedVia === 'thermal' ? 'printing on thermal printer.' : 'opening print dialog.';
  document.getElementById('confirmation-text').textContent =
    'Order #' + order.id.replace('ORD-','') + ' for ' + name + ' — ' + tail + ' Hand customer copy to guest, kitchen copy to cook.';
  document.getElementById('order-confirmation').classList.add('active');
  cart = [];
  appliedPromo = null;
  document.getElementById('promo-input').value = '';
  document.getElementById('promo-msg').textContent = '';
  document.getElementById('promo-msg').className = 'promo-msg';
  document.getElementById('customer-name').value = '';
  updateOrderBar();
}

function closeConfirmation() { document.getElementById('order-confirmation').classList.remove('active'); }

function receiptHtml(order, copyLabel) {
  var when = new Date(order.timestamp).toLocaleString([], { dateStyle: 'short', timeStyle: 'short' });
  var itemsHtml = order.items.map(function(i) {
    return '<div class="r-row"><span>' + i.quantity + 'x ' + i.name + '</span><span>$' + Number(i.total).toFixed(2) + '</span></div>' +
      (i.options && i.options.length ? '<div class="r-opts">' + i.options.join(', ') + '</div>' : '');
  }).join('');
  var sub = order.subtotal != null ? order.subtotal : order.total;
  return '<div class="receipt">' +
    '<div class="r-center r-title">EDEN GRILL</div>' +
    '<div class="r-center">OKC</div>' +
    '<div class="r-center r-copy">' + copyLabel + '</div>' +
    '<hr>' +
    '<div class="r-row"><span>Order #</span><span>' + order.id.replace('ORD-', '') + '</span></div>' +
    '<div class="r-row"><span>Date</span><span>' + when + '</span></div>' +
    '<div class="r-row"><span>Name</span><span>' + order.customer.name + '</span></div>' +
    '<hr>' +
    itemsHtml +
    '<hr>' +
    '<div class="r-row"><span>Subtotal</span><span>$' + Number(sub).toFixed(2) + '</span></div>' +
    (order.discount ? '<div class="r-row"><span>Discount ' + (order.promoCode ? '(' + order.promoCode + ')' : '') + '</span><span>-$' + Number(order.discount).toFixed(2) + '</span></div>' : '') +
    '<div class="r-row r-total"><span>TOTAL</span><span>$' + Number(order.total).toFixed(2) + '</span></div>' +
    '<div class="r-row"><span>Paid</span><span>CASH</span></div>' +
    '<hr>' +
    '<div class="r-foot">Made to order · Thank you!</div>' +
  '</div>';
}

function printReceipts(order) {
  document.getElementById('print-area').innerHTML =
    receiptHtml(order, 'CUSTOMER COPY') + receiptHtml(order, 'KITCHEN COPY');
  window.print();
}

function printerMsg(text, kind) {
  var el = document.getElementById('printer-msg');
  el.textContent = text || '';
  el.className = 'printer-msg' + (kind ? ' ' + kind : '');
}

function refreshPrinterUI() {
  var st = window.EdenPrinter ? EdenPrinter.status() : { connected: false };
  var sup = window.EdenPrinter ? EdenPrinter.isSupported() : { usb: false, bluetooth: false };
  document.getElementById('printer-dot').classList.toggle('on', st.connected);
  var sdot = document.getElementById('printer-status-dot');
  var stext = document.getElementById('printer-status-text');
  if (sdot) sdot.classList.toggle('on', st.connected);
  if (stext) stext.textContent = st.connected ? 'Connected: ' + st.name + ' (' + (st.kind === 'usb' ? 'USB' : 'BT') + ')' : 'Not connected';
  var btnUsb = document.getElementById('btn-usb');
  var btnBt = document.getElementById('btn-bt');
  var btnTest = document.getElementById('btn-test');
  var btnDisc = document.getElementById('btn-disc');
  if (btnUsb) { btnUsb.disabled = !sup.usb; btnUsb.textContent = sup.usb ? 'Connect USB Printer' : 'USB not supported'; }
  if (btnBt) { btnBt.disabled = !sup.bluetooth; btnBt.textContent = sup.bluetooth ? 'Connect Bluetooth Printer' : 'BT not supported'; }
  if (btnTest) btnTest.disabled = !st.connected;
  if (btnDisc) btnDisc.disabled = !st.connected;
  var cols = window.EdenPrinter ? EdenPrinter.getCols() : 48;
  document.getElementById('paper-58').classList.toggle('sel', cols === 32);
  document.getElementById('paper-80').classList.toggle('sel', cols === 48);
  document.getElementById('paper-4x6').classList.toggle('sel', cols === 64);
  var note = document.getElementById('printer-support-note');
  if (note) note.textContent = (!sup.usb && !sup.bluetooth) ? 'No USB/BT support — receipts use browser print dialog.' : 'USB may need WinUSB driver (Zadig). Use Chrome for Bluetooth.';
}

function openPrinter() { document.getElementById('printer-modal').classList.add('active'); printerMsg(''); refreshPrinterUI(); }
function closePrinter() { document.getElementById('printer-modal').classList.remove('active'); }

async function connectPrinter(kind) {
  printerMsg('Opening device picker…');
  try {
    if (kind === 'usb') await EdenPrinter.connectUSB();
    else await EdenPrinter.connectBluetooth();
    printerMsg('Connected.', 'ok');
  } catch (err) {
    if (err && (err.name === 'NotFoundError' || /cancel/i.test(err.message || ''))) printerMsg('No printer selected.');
    else printerMsg(err && err.message ? err.message : 'Could not connect.', 'err');
  }
  refreshPrinterUI();
}

async function disconnectPrinter() {
  try { await EdenPrinter.disconnect(); printerMsg('Disconnected.'); } catch (e) {}
  refreshPrinterUI();
}

function setPaper(cols) { if (window.EdenPrinter) EdenPrinter.setCols(cols); refreshPrinterUI(); }

async function testPrint() {
  var testOrder = {
    id: 'ORD-000000', location: 'okc', customer: { name: 'TEST PRINT' },
    items: [{ name: 'Smash Hamburger', options: ['American', 'Lettuce', 'Bacon'], quantity: 1, total: 14 }],
    subtotal: 14, discount: 0, promoCode: null, total: 14, payment: 'cash', paid: true,
    timestamp: new Date().toISOString()
  };
  try { await EdenPrinter.printOrder(testOrder); printerMsg('Test receipt sent.', 'ok'); }
  catch (err) { printerMsg(err && err.message ? err.message : 'Test print failed.', 'err'); }
}

if (window.EdenPrinter) EdenPrinter.onChange(refreshPrinterUI);
refreshPrinterUI();

async function load() {
  var res = await fetch('menu.json', { cache: 'no-store' });
  menuData = await res.json();
  renderAll();
}
load();
</script>
</body>
</html>
